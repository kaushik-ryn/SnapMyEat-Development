{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Order</title>
    <!-- CSS -->
    <!-- Bootstrap -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/modern/viewOrder.css' %}" />
  </head>
  <body>
  <!-- Navbar start -->
  <div>
    <nav class="purple-bg full-width">
      <div>
        <div class="tableNumber">
          <br />
          <p>
            Table no.
            <b>
              <span>{{ TABLE|stringformat:"02d" }}</span>
            </b>
          </p>
          <br />
          <a href="{% url 'menu_items' restaurantID=RST.id tableNo=TABLE %}">
            <button class="catBtn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="40"
                height="40"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </button>
          </a>
        </div>
      </div>
    </nav>
  </div>
<!-- Navbar ends -->

<!-- Content Start -->
<div class="container">
  <h2>Enter Your Order Number</h2>
  <form action="{% url 'order_details' restaurantID=RST.id tableNo=TABLE %}" method="POST">
    {% csrf_token %}
    <input type="number" id="orderNumber" name="OrderNumber" placeholder="Order No.">
  <button class="submit-btn" type="submit">Submit</button>
  </form>
</div>

<!-- SECURITY BLOCK -->
{% include 'customer/security_block.html' %}

</body>
</html>
