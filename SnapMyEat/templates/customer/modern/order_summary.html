    <script>
      async function fetchingPrice() {
    let response = await fetch(
      "{% url 'fetch_details' restaurantID=RST.id %}",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": "{{ csrf_token }}",
        },
        body: JSON.stringify(cartData.dishItems),
      }
    );
  
    globalThis.cartItems = await response.json();
    renderCart();
    requestAnimationFrame(recalculateTotal);
    
  }
  
  document
    .getElementById("placeOrderLink")
    .addEventListener("click", function (event) {
      event.preventDefault(); // Prevent default navigation
  
      let encodedCartItems = encodeURIComponent(JSON.stringify(cartItems));
      // let placeOrderUrl = `{% url 'placed_order' restaurantID=RST.id tableNo=table %}?cartItems=${encodedCartItems}`;
      let placeOrderUrl = `{% url 'placed_order' restaurantID=RST.id tableNo=table %}`;
      fetch(placeOrderUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: new URLSearchParams({
            cartItems: JSON.stringify(cartItems)
        })
    })
    .then(response => {
        if (response.redirected) {
            // If you redirect in Django, this will follow
            window.location.href = response.url;
        } else {
            // Manually redirect to GET version
            window.location.href = placeOrderUrl;
        }
    })
    .catch(error => {
        console.error("Error placing order:", error);
    });
      // window.location.href = placeOrderUrl;
    });
    </script>
