{% load static %}

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %}</title>
    <!-- Navbar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
    <link rel="stylesheet" href="{% static 'css/starter/Navbar.css' %}?v=3" />
    {% block HeadCss %}{% endblock HeadCss %}
      <!-- Bootstrap -->
  </head>
  <body>
    <div>
      <nav class="purple-bg full-width">
        <div>
          <div class="tableNumber">
            <br />
            <p><small>{% block RST-Name %}{% endblock RST-Name %}</small></p>
            <p>
              Table no.
              <br />
              <b>
                <span class="Tableno">{% block TableNo %}{% endblock TableNo %}</span>
              </b>
            </p>
            <br />
            {% block ButtonCMD %}
            {% endblock ButtonCMD %}
          </div>
        </div>
      </nav>
    </div>
    <!-- Navbar ends -->
    {% block BodyContent %}{% endblock BodyContent %}

  </body>
</html>
