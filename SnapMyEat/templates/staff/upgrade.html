{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upgrade Your Plan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/staff/upgrade.css' %}">
</head>

<body>
  <div class="container">
    <div class="d-flex justify-content-between align-items-center flex-wrap mb-4 px-2">
      <!-- Go Back Button: Visible on all screens, stays left -->
      <button onclick="history.back()" class="btn btn-outline-secondary btn-sm order-1 order-md-0 mb-2 mb-md-0">
        ← Go Back
      </button>

      <!-- Title: Always centered -->
      <div class="flex-grow-1 text-center">
        <h2 class="plan-switch m-0" style="color:#6c5648;">Stay Flexible — Go Monthly</h2>
      </div>

      <!-- Placeholder div to balance spacing on right (makes title truly center) -->
      <div class="d-none d-md-block" style="width: 90px;"></div>
    </div>

    <div class="panel flex-column flex-md-row">
      <div class="left-panel mb-4 mb-md-0">
        <div>
          <div class="template-option" id="starterOption" onclick="showTemplate('starter')">
            <img width="50" height="50" src="https://img.icons8.com/ios-filled/50/kawaii-noodle--v2.png"
              alt="starter" />
            <h5 style="color:#6c5648;">Starter Template</h5>
          </div>
          <div class="template-option" id="modernaOption" onclick="showTemplate('moderna')">
            <img width="50" height="50" src="https://img.icons8.com/ios-filled/50/bread-and-rye--v1.png"
              alt="moderna" />
            <h5 style="color:#6c5648;">Modern Template</h5>
          </div>
        </div>

        <div class="bottom-image-wrapper d-none d-md-flex">
          <img style="width:240px; height:240px;" src="{% static 'images/staff/waiter.jpg' %}" alt="Here’s your dine">
          <span style="color:#6c5648; font-family: 'Roboto', sans-serif;">Here's your Dine</span>
        </div>
      </div>

      <div class="right-panel">
        <button id="closeBtn" class="close-btn d-none"style="background-color:#6c5648;" onclick="location.reload()">×</button>
        <div id="introText" style="color:#6c5648;">Choose your Dine template</div>
        <div id="carouselExample" class="carousel slide d-none" data-bs-ride="carousel" data-bs-interval="2000">
          <div class="carousel-inner" id="carouselContent"></div>
        </div>

        <div class="plan-details d-none" id="planDetails"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('closeBtn').classList.remove('d-none');
    function showTemplate(type) {
      document.getElementById('closeBtn').classList.remove('d-none'); // ✅ show close button
      document.getElementById('introText').classList.add('d-none');
      document.getElementById('carouselExample').classList.remove('d-none');
      document.getElementById('planDetails').classList.remove('d-none');

      // Reset styles
      document.getElementById('starterOption').classList.remove('active');
      document.getElementById('modernaOption').classList.remove('active');

      if (type === 'starter') {
        document.getElementById('starterOption').classList.add('active');
        document.getElementById('carouselContent').innerHTML = `
      <div class="carousel-item active">
        <img src="{% static 'images/staff/starter#1.jpg' %}" alt="Starter Image 1">
      </div>
      <div class="carousel-item">
        <img src="{% static 'images/staff/starter#2.jpg' %}" alt="Starter Image 2">
      </div>
    `;
        document.getElementById('planDetails').innerHTML = `
      <h4>StartUp Menu</h4>
      <p>Ideal for small restaurants & cafes</p>
      <div class="price" style="color:#6c5648;">₹ 4,000 / month</div>
      
      <ul class="features mt-3">
        <li>1 to 6 Tables</li>
        <li>70 Items</li>
        <li>Minimalist Aesthetic</li>
        <li>Orders Insights</li>
        <li>No Credit Card Needed</li>
      </ul>
      <button class="btn-upgrade" style="background-color:#6c5648;">Use This Template</button>
    `;
      } else {
        document.getElementById('modernaOption').classList.add('active');
        document.getElementById('carouselContent').innerHTML = `
      <div class="carousel-item active">
        <img src="{% static 'images/staff/modern#1.jpg' %}" alt="Modern Image 1">
      </div>
      <div class="carousel-item">
        <img src="{% static 'images/staff/modern#2.jpg' %}" alt="Modern Image 2">
      </div>
    `;
        document.getElementById('planDetails').innerHTML = `
      <h4>Moderna Pro</h4>
      <p>Best for large restaurants & franchises</p>
      <div class="price" style="color:#6c5648;">₹ 5,000 / month</div>
      <ul class="features mt-3">
        <li>1 to 15 Tables</li>
        <li>140 Items</li>
        <li>Modern User Interface</li>
        <li>No Credit Card Needed</li>
        <li>Modern Template unlocks all previous templates with upgraded functionality.</li>
      </ul>
      <button class="btn-upgrade" style="background-color:#6c5648;">Use This Template</button>
    `;
      }
    }

    const myCarousel = document.querySelector('#carouselExample');
    const carousel = new bootstrap.Carousel(myCarousel, {
      interval: 2000,
      ride: 'carousel'
    });

  </script>
</body>

</html>
