{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapMyEat - Email OTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/forgot_password.css' %}">
</head>
<body>
  <div class="container">
    <div class="image-section">
      <img src="https://img.freepik.com/premium-vector/italian-chef-holding-pizza-hand-drawn-sketch-restaurant-business-concept-logo-vector-illustration_666729-476.jpg?w=2000" alt="Chef Illustration" />
    </div>
    <div class="form-section">
      <h2>SnapMyEat</h2>
      <form id="emailForm" method="POST">
        {% csrf_token %}
        <label for="email">Enter your Email</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required />
        <button type="submit">Send OTP</button>
      </form>
    </div>
  </div>
</body>
</html>
